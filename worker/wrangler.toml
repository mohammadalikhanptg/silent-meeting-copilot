name = "smc-engine"
main = "src/index.js"
compatibility_date = "2024-09-23"
account_id = "6b8a541251738b917ee0289afb8eadce"

[ai]
binding = "AI"

[durable_objects]
bindings = [
  { name = "SESSIONS", class_name = "SessionDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO"]

# Rate limiting (F1) — abuse / cost / DoS backstop on the generation endpoints.
# Per-location counters (Cloudflare native Rate Limiting). namespace_ids are
# unique within this account; the worker fails open if a binding is absent.
# RL_IP   : per source IP, checked before the auth callback (bad-token flood guard).
# RL_USER : per authenticated user + endpoint (covers live /coach polling).
# RL_HEAVY: extra, tighter bucket for the expensive /transcribe path.
[[ratelimits]]
name = "RL_IP"
namespace_id = "7701"
  [ratelimits.simple]
  limit = 120
  period = 60

[[ratelimits]]
name = "RL_USER"
namespace_id = "7702"
  [ratelimits.simple]
  limit = 90
  period = 60

[[ratelimits]]
name = "RL_HEAVY"
namespace_id = "7703"
  [ratelimits.simple]
  limit = 20
  period = 60

[vars]
APP_BASE_URL = "https://silent-meeting-copilot.vercel.app"
# Meeting-bot per-participant ingestion (Bot build 1/N). OFF by default.
# Anything other than "true"/"1" leaves the bot ingestion path dormant. Real
# (non-synthetic) capture is additionally hard-disabled in the engine until the
# live capture path is built and the consent/security gate is cleared.
BOT_CAPTURE_ENABLED = "false"

# Session audio retention to R2 (additive, OFF by default). Persists per-session
# captured frames ONLY when this is "true" AND the session opted in (retainAudio
# in DO storage, set by the consent flow). Default OFF preserves the engine's
# no-audio-persistence guarantee.
AUDIO_RETENTION_ENABLED = "false"

# Sarvam Saaras v3 streaming engine (additive, OFF by default). When "true" AND a
# session selects engine=sarvam, ME/OTHERS PCM frames relay to Sarvam instead of
# nova-3. nova-3 stays the default engine and the fallback. SARVAM_API_KEY is a secret.
SARVAM_ENABLED = "true"
SARVAM_MODE = "codemix"
SARVAM_LANG = "hi-IN"
SARVAM_CODEC = "pcm_s16le"
SARVAM_ENCODING = "audio/wav"
SARVAM_DEBUG = "true"

[[r2_buckets]]
binding = "SESSION_AUDIO"
bucket_name = "smc-session-audio"
