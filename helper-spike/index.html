<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>SMC Capture Spike</title>
  <style>
    body { font-family: Segoe UI, system-ui, sans-serif; margin: 0; padding: 20px; background:#0f1115; color:#e6e8eb; }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { color:#9aa0a6; font-size:12px; margin-bottom:16px; }
    .row { display:flex; gap:16px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
    label { font-size:13px; color:#c5cbd3; }
    select, button { font-size:14px; padding:8px 10px; border-radius:8px; border:1px solid #2a2f37; background:#171a21; color:#e6e8eb; }
    button { cursor:pointer; }
    button.primary { background:#2563eb; border-color:#2563eb; }
    button:disabled { opacity:0.5; cursor:default; }
    .meters { display:flex; gap:24px; margin:18px 0; }
    .meter { flex:1; }
    .meter h2 { font-size:13px; margin:0 0 6px; color:#c5cbd3; }
    canvas { width:100%; height:40px; background:#171a21; border-radius:8px; display:block; }
    #log { white-space:pre-wrap; font-family:Consolas,monospace; font-size:12px; background:#0b0d11; border:1px solid #2a2f37; border-radius:8px; padding:10px; height:200px; overflow:auto; }
  </style>
</head>
<body>
  <h1>Silent Meeting Copilot - capture spike</h1>
  <div class="sub" id="ver"></div>

  <div class="row">
    <label for="mic">Microphone (ME):</label>
    <select id="mic"></select>
    <button id="refresh">Refresh devices</button>
  </div>
  <div class="row">
    <button id="start" class="primary">Start capture</button>
    <button id="stop" disabled>Stop</button>
    <span class="sub">OTHERS = system output (loopback), captured automatically on Windows.</span>
  </div>

  <div class="meters">
    <div class="meter"><h2>ME (microphone)</h2><canvas id="meterMe" width="400" height="40"></canvas></div>
    <div class="meter"><h2>OTHERS (system loopback)</h2><canvas id="meterOthers" width="400" height="40"></canvas></div>
  </div>

  <div id="log"></div>
  <script src="renderer.js"></script>
</body>
</html>
