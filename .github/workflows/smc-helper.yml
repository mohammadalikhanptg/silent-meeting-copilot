name: Build SMC Helper
on:
  push:
    branches: [main]
    paths:
      - 'helper/**'
      - '.github/workflows/smc-helper.yml'
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    defaults:
      run:
        working-directory: helper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run dist:${{ matrix.platform }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Setup .NET 8 (Trusted Signing prerequisite)
        if: matrix.platform == 'win' && env.AZURE_CLIENT_ID != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Azure login (OIDC, no secret)
        if: matrix.platform == 'win' && env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Sign Windows installer (Azure Trusted Signing)
        if: matrix.platform == 'win' && env.AZURE_CLIENT_ID != ''
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: https://weu.codesigning.azure.net/
          trusted-signing-account-name: pacificinfotech-signing
          certificate-profile-name: pacificinfotech-public-trust
          files-folder: ${{ github.workspace }}/helper/dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - uses: actions/upload-artifact@v4
        with:
          name: smc-helper-${{ matrix.platform }}
          path: |
            helper/dist/*.exe
            helper/dist/*.dmg
            helper/dist/*.zip
          if-no-files-found: ignore
      - name: Create or update GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: helper-latest
          name: SMC Helper (latest)
          draft: false
          prerelease: false
          files: |
            helper/dist/*.exe
            helper/dist/*.dmg
            helper/dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
