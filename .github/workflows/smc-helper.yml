name: Build SMC Helper
on:
  push:
    branches: [main]
    paths:
      - 'helper/**'
      - '.github/workflows/smc-helper.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: helper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run dist:${{ matrix.platform }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: smc-helper-${{ matrix.platform }}
          path: |
            helper/dist/*.exe
            helper/dist/*.dmg
            helper/dist/*.zip
          if-no-files-found: ignore
      - name: Create or update GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: helper-latest
          name: SMC Helper (latest)
          draft: false
          prerelease: false
          files: |
            helper/dist/*.exe
            helper/dist/*.dmg
            helper/dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
